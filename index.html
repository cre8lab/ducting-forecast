:root{
  --bg:#0d1117;--panel:#161b22;--border:#30363d;

}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px}
body{display:flex;flex-direction:column}

/* ── Header ── */
#hdr{background:var(--panel);border-bottom:1px solid var(--border);
  padding:7px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.callsign{font-size:17px;font-weight:700;color:var(--ham);letter-spacing:.05em;white-space:nowrap;line-height:1.2}
.callsign small{display:block;font-size:10px;font-weight:400;color:var(--muted)}
.htitle{color:var(--accent);font-size:13px;font-weight:600;white-space:nowrap}
.hsub{color:var(--muted);font-size:10px}
.spacer{flex:1}
.legend-wrap{display:flex;flex-direction:column;gap:2px;min-width:160px}
.legend-bar{height:10px;border-radius:3px;
  background:linear-gradient(to right,#3fb950,#d29922,#f0883e,#f85149)}
.legend-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted)}
.btn-link{text-decoration:none;padding:5px 11px;font-size:11px;font-weight:600;
  border:1px solid var(--border);border-radius:5px;color:var(--text);white-space:nowrap;
  transition:border-color .15s}
.btn-link:hover{border-color:var(--accent);color:var(--accent)}

/* ── Mode toggle ── */
.mode-group{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden;flex-shrink:0}
.mode-btn{background:var(--bg);border:none;color:var(--muted);font-size:11px;font-weight:600;
  padding:4px 10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.mode-btn+.mode-btn{border-left:1px solid var(--border)}
.mode-btn.active{background:var(--accent);color:#000}
.mode-btn:hover:not(.active){color:var(--accent)}

/* ── Map ── */
#map{position:absolute;inset:0;cursor:crosshair;background:#111}

/* ── Controls bar ── */
#ctrl{background:var(--panel);border-top:1px solid var(--border);
  padding:7px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ctrl-btn{background:var(--bg);border:1px solid var(--border);border-radius:5px;
  color:var(--text);font-size:14px;padding:4px 10px;cursor:pointer;transition:border-color .15s}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctrl-btn:disabled{opacity:.35;cursor:not-allowed}
#time-display{min-width:260px;text-align:center}
#time-label{font-size:14px;font-weight:600;color:var(--text)}
#time-offset{font-size:11px;color:var(--muted);margin-left:6px}
#scrubber{flex:1;min-width:80px;accent-color:var(--ham);cursor:pointer;height:4px}
.spd-group{display:flex;gap:3px}
.spd{background:var(--bg);border:1px solid var(--border);border-radius:4px;
  color:var(--muted);font-size:11px;font-weight:600;padding:3px 8px;cursor:pointer;
  transition:all .15s}
.spd:hover{border-color:var(--accent);color:var(--accent)}
.spd.active{background:var(--ham);border-color:var(--ham);color:#000}

/* ── Loading overlay ── */
#load-overlay{position:fixed;inset:0;background:rgba(13,17,23,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;gap:16px}
#load-overlay.hidden{display:none}
.load-call{font-size:32px;font-weight:700;color:var(--ham);letter-spacing:.05em}
.load-title{font-size:14px;color:var(--muted)}
.load-bar-wrap{width:320px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
#load-bar{height:100%;background:var(--ham);border-radius:3px;width:0;transition:width .2s}
#load-status{font-size:12px;color:var(--muted)}

/* ── Leaflet popup dark style ── */
.leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);
  border:1px solid var(--border);border-radius:6px;padding:0}

.popup-coords{font-size:11px;color:var(--muted);margin-bottom:6px}

  padding:5px 10px;text-decoration:none;font-weight:600;font-size:11px;text-align:center;

/* ── Timestamp overlay on map ── */

  background:rgba(22,27,34,.85);border:1px solid var(--border);border-radius:6px;

  font-size:13px;font-weight:600;letter-spacing:.03em;backdrop-filter:blur(4px)}
#ts-overlay.hidden{display:none}

<!-- ══════════════════════════════════════════════════════
     PHYSICS ENGINE  (ITU-R P.453-14)  — identical to site.html
══════════════════════════════════════════════════════ -->
<script>
'use strict';

const RE_KM       = 6371.0;
const N41_MHZ     = 2593.0;
const DUCT_THRESH = -157.0;
const STD_GRAD    = -40.0;

function satVP(T_K){const Tc=T_K-273.15;return 6.1078*Math.exp(17.2694*Tc/(Tc+237.29))}
function calcN(P,T,e){return 77.6*P/T+373246*e/(T*T)}
function calcM(N,h_km){return N+(h_km/RE_KM)*1e6}
function gradClass(g){if(g>0)return'sub-refractive';if(g>STD_GRAD)return'normal';if(g>DUCT_THRESH)return'super-refractive';return'ducting'}

function computeProfile(pressures,heights,temps,dewpoints){
  const lvs=pressures.map((P,i)=>{
    const T=temps[i]+273.15,Td=dewpoints[i]+273.15,e=satVP(Td);
    const N=calcN(P,T,e),M=calcM(N,heights[i]/1000);
    return{pressure_hPa:P,height_m:heights[i],temp_C:temps[i],dewpoint_C:dewpoints[i],N:+N.toFixed(2),M:+M.toFixed(2)};
  });
  lvs.sort((a,b)=>a.height_m-b.height_m);
  for(let i=1;i<lvs.length;i++){
    const dh=(lvs[i].height_m-lvs[i-1].height_m)/1000;
    if(dh>0){lvs[i].dN_dh=+((lvs[i].N-lvs[i-1].N)/dh).toFixed(1);lvs[i].dM_dh=+((lvs[i].M-lvs[i-1].M)/dh).toFixed(1);lvs[i].gradient_class=gradClass(lvs[i].dN_dh);}
  }
  if(lvs.length)lvs[0].gradient_class='surface';
  return lvs;
}

function detectDucts(profile){
  const ducts=[];let inDuct=false,bi=0,Mb=0,Mm=0;
  for(let i=1;i<profile.length;i++){
    const dM=profile[i].dM_dh;if(dM===undefined)continue;
    if(!inDuct&&dM<0){inDuct=true;bi=i-1;Mb=profile[i-1].M;Mm=profile[i].M;}
    else if(inDuct){
      Mm=Math.min(Mm,profile[i].M);
      if(profile[i].M>=Mb||(dM>5&&profile[i].M>Mm+2)){
        const dv=Mb-Mm;if(dv>=0.5)ducts.push(_bduct(profile,bi,i,Mb,dv));inDuct=false;
      }
    }
  }
  if(inDuct){const dv=Mb-Mm;if(dv>=1)ducts.push(_bduct(profile,bi,profile.length-1,Mb,dv));}
  return ducts;
}

function _bduct(profile,bi,ti,Mb,dM){
  const bh=profile[bi].height_m,th=profile[ti].height_m,tm=th-bh;
  const gs=profile.slice(bi+1,ti+1).filter(l=>l.dN_dh!==undefined).map(l=>l.dN_dh);
  const mg=gs.length?gs.reduce((a,b)=>a+b,0)/gs.length:DUCT_THRESH;
  const dN=Math.abs(mg)*(tm/1000);
  let fc=Infinity,hop=0;
  if(dN>0&&tm>0){const hz=(3e8/(2*tm))*Math.sqrt(1/(2*dN*1e-6));fc=hz/1e6;}
  const tn41=fc<=N41_MHZ;
  if(tn41&&dN>0){const tc=Math.sqrt(2*dN*1e-6);if(tc>0)hop=Math.round(2*(tm/1000)/tc);}
  return{base_m:bh,top_m:th,thickness_m:tm,delta_M:+dM.toFixed(1),mean_dN_dh:+mg.toFixed(1),
         duct_type:bh<200?'surface':'elevated',gradient_class:gradClass(mg),traps_n41:tn41,critical_f_MHz:Math.round(fc),max_hop_km:hop};
}

function interferenceRisk(ducts,profile){
  const srProxy=profile?((()=>{
    const srLayers=profile.filter(l=>l.dN_dh!==undefined&&l.dN_dh<=STD_GRAD);
    if(!srLayers.length)return 0;
    const strongest=Math.min(...srLayers.map(l=>l.dN_dh));
    if(strongest>STD_GRAD)return 0;
    if(strongest>DUCT_THRESH)return Math.round((-strongest-40)/(157-40)*20);
    return Math.min(30,Math.round(20+(-strongest-157)/50*10));
  })())
  :0;

  if(!ducts.length){
    if(srProxy>0){
      const lvl=srProxy>=20?'moderate':srProxy>=10?'low':'low';
      return{score:srProxy,level:lvl,description:'',n41_ducts:0,best_duct:null};
    }
    return{score:0,level:'none',description:'',n41_ducts:0,best_duct:null};
  }
  const n41=ducts.filter(d=>d.traps_n41);
  if(!n41.length){
    const s=Math.max(5,srProxy);
    return{score:s,level:'low',description:'',n41_ducts:0,best_duct:null};
  }
  const best=n41.reduce((a,b)=>a.delta_M>b.delta_M?a:b);
  const rawScore=Math.min(40,Math.round(best.delta_M*4))+Math.min(30,Math.round(best.max_hop_km/15))+(best.duct_type==='surface'?20:10);
  const score=Math.min(100,rawScore+Math.round(srProxy*0.3));
  const level=score>=80?'severe':score>=55?'high':score>=30?'moderate':'low';
  return{score,level,description:'',n41_ducts:n41.length,best_duct:best};
}


// ══════════════════════════════════════════════════════
// DATA CLIENT
// ══════════════════════════════════════════════════════
const OM_FCST  = 'https://api.open-meteo.com/v1/forecast';
const OM_ERA5  = 'https://archive-api.open-meteo.com/v1/era5';
const PLEVELS  = [1000,975,950,925,900,850,800,750,700,600,500,400,300];

function _omVars(){
  const plev=PLEVELS.flatMap(lv=>[`temperature_${lv}hPa`,`dewpoint_${lv}hPa`,`geopotential_height_${lv}hPa`]).join(',');
  // temperature_80m + relativehumidity_80m fill the near-surface gap; skin_temperature drives evaporation duct model
  return plev+',temperature_2m,dewpoint_2m,surface_pressure,windspeed_10m,temperature_80m,relativehumidity_80m,skin_temperature';
}

async function fetchRawOM(lat,lon){
  const url=`${OM_FCST}?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}`
    +`&hourly=${_omVars()}&models=gfs_seamless&forecast_days=7&timezone=UTC`;
  const r=await fetch(url);
  if(!r.ok)throw new Error(`OM ${r.status}`);
  const json=await r.json();
  return{hourly:json.hourly,elevation:json.elevation??0};
}

// ERA5 has ~5-day publication lag; returns past 7 days ending 5 days ago
function era5Dates(){
  const end=new Date();end.setUTCHours(0,0,0,0);
  end.setUTCDate(end.getUTCDate()-5);
  const start=new Date(end);start.setUTCDate(start.getUTCDate()-6);
  return{
    start:start.toISOString().split('T')[0],
    end:end.toISOString().split('T')[0],
    startMs:start.getTime()
  };
}

async function fetchRawERA5(lat,lon,startDate,endDate){
  const url=`${OM_ERA5}?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}`
    +`&hourly=${_omVars()}&start_date=${startDate}&end_date=${endDate}&timezone=UTC`;
  const r=await fetch(url);
  if(!r.ok)throw new Error(`ERA5 ${r.status}`);
  const json=await r.json();
  return{hourly:json.hourly,elevation:json.elevation??0};
}

function extractLevels(hourly,h,elev_m){
  const levels=PLEVELS.map(lv=>{
    const T=hourly[`temperature_${lv}hPa`]?.[h];
    const Td=hourly[`dewpoint_${lv}hPa`]?.[h];
    const H=hourly[`geopotential_height_${lv}hPa`]?.[h];
    if(T==null||Td==null||H==null)return null;
    if(T<-90||T>60)return null;
    return{pressure_hPa:lv,height_m:H,temp_C:T,dewpoint_C:(Td<-90?T-25:Td)};
  }).filter(Boolean);

  const T2   =hourly['temperature_2m']?.[h];
  const Td2  =hourly['dewpoint_2m']?.[h];
  const Ps   =hourly['surface_pressure']?.[h];
  const T80  =hourly['temperature_80m']?.[h];
  const RH80 =hourly['relativehumidity_80m']?.[h];
  const Tskin=hourly['skin_temperature']?.[h];

  if(T2==null||Td2==null||Ps==null||T2<=-90||T2>=60)return levels;

  const h0   =elev_m??0;
  const Td2c =Td2<-90?T2-25:Td2;

  // 80m boundary layer level (hypsometric P, Magnus Td)
  let lv80=null;
  if(T80!=null&&T80>-90&&T80<60&&RH80!=null&&RH80>=0&&RH80<=105){
    const h80=h0+80;
    const Td80=T80-(100-Math.min(100,RH80))/5;
    const P80=Ps*Math.exp(-80/(29.3*((T2+T80)/2+273.15)));
    lv80={pressure_hPa:+P80.toFixed(1),height_m:h80,temp_C:T80,dewpoint_C:+Td80.toFixed(1)};
  }

  // Evaporation duct proxy: skin warmer than 2m air + moist air = open water surface
  // GFS 2m obs = ambient air above the duct; skin = near-saturated water surface
  const dewDep=T2-Td2c;
  const evapDuct=Tskin!=null&&Tskin>-90&&Tskin<60&&Tskin>T2+0.5&&dewDep<10;

  let baseLevels,nearCut;
  if(evapDuct){
    // Estimated duct height (m): empirical ~3× air-water dewpoint spread, capped 8-60m
    const h_e=Math.max(8,Math.min(60,Math.round(3*(Tskin-Td2c))));
    const Psk=Ps*Math.exp(-h0/(29.3*(Tskin+273.15)));
    const Phe=Ps*Math.exp(-(h0+h_e)/(29.3*((Tskin+T2)/2+273.15)));
    // skin (0m, ~98% RH) → duct top (h_e, GFS 2m ambient)
    baseLevels=[
      {pressure_hPa:+Psk.toFixed(1),height_m:h0,      temp_C:Tskin,dewpoint_C:+(Tskin-0.5).toFixed(1)},
      {pressure_hPa:+Phe.toFixed(1),height_m:h0+h_e,  temp_C:T2,   dewpoint_C:Td2c}
    ];
    nearCut=h0+h_e+5;
  }else{
    baseLevels=[{pressure_hPa:Ps,height_m:h0+2,temp_C:T2,dewpoint_C:Td2c}];
    nearCut=h0+7;
  }

  const pCut=lv80?h0+85:nearCut;
  return lv80?[...baseLevels,lv80,...levels.filter(l=>l.height_m>pCut)]
             :[...baseLevels,...levels.filter(l=>l.height_m>pCut)];
}

function scorePoint(hourly,h,elevation){
  const levels=extractLevels(hourly,h,elevation);
  if(levels.length<4)return 0;
  const profile=computeProfile(
    levels.map(l=>l.pressure_hPa),levels.map(l=>l.height_m),
    levels.map(l=>l.temp_C),levels.map(l=>l.dewpoint_C));
  return interferenceRisk(detectDucts(profile),profile).score;
}


// ══════════════════════════════════════════════════════
// CONUS GRID  (1° × 1°, 1620 points, 24-50°N, 125-66°W)
// ══════════════════════════════════════════════════════
const GL_LATS = Array.from({length:27},(_,i)=>24+i);        // 24..50 at 1°
const GL_LONS = Array.from({length:60},(_,i)=>-125+i);      // -125..-66 at 1°
const GL_PTS  = GL_LATS.flatMap(lat=>GL_LONS.map(lon=>[lat,lon]));

// Animation: every 6 h for 7 days = 28 frames
const ANIM_HOURS = Array.from({length:28},(_,i)=>i*6);     // 0,6,12,...,162

// frames[i] = {h, label, offset, points:[[lat,lon,norm],...]}
let frames = [];
let currentFrame = 0;
let playing = false;
let animTimer = null;
let frameMs = 500;
let currentMode = 'gfs';  // 'gfs' | 'era5'

function glCacheKey(){return`kd9wxy_gl_v4_${currentMode}_${new Date().toISOString().split('T')[0]}`}
const GL_TTL = 30*60*1000;

function loadGLCache(){
  try{const raw=sessionStorage.getItem(glCacheKey());if(!raw)return null;
    const{ts,data}=JSON.parse(raw);if(Date.now()-ts>GL_TTL)return null;return data;}catch{return null;}
}
function saveGLCache(data){
  try{sessionStorage.setItem(glCacheKey(),JSON.stringify({ts:Date.now(),data}));}catch{}
}

function frameLabel(h,era5StartMs){
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(era5StartMs==null){
    // GFS: relative to now
    if(h===0)return{label:'Now',offset:''};
    const base=new Date();base.setMinutes(0,0,0);
    const ft=new Date(base.getTime()+h*3600*1000);
    const hh=String(ft.getUTCHours()).padStart(2,'0');
    return{label:`${DAYS[ft.getUTCDay()]} ${MONS[ft.getUTCMonth()]} ${ft.getUTCDate()} · ${hh} UTC`,offset:`+${h}h`};
  }
  // ERA5: absolute dates
  const ft=new Date(era5StartMs+h*3600*1000);
  const hh=String(ft.getUTCHours()).padStart(2,'0');
  return{label:`${DAYS[ft.getUTCDay()]} ${MONS[ft.getUTCMonth()]} ${ft.getUTCDate()} · ${hh} UTC`,offset:'ERA5'};
}

async function loadGLData(){
  const cached=loadGLCache();
  if(cached){
    frames=cached;
    setLoadStatus('Loaded from cache',GL_PTS.length,GL_PTS.length);
    setTimeout(()=>{hideOverlay();startAnimation();},400);
    return;
  }

  let era5StartMs=null;
  let fetchFn;

  if(currentMode==='era5'){
    const{start,end,startMs}=era5Dates();
    era5StartMs=startMs;
    fetchFn=(lat,lon)=>fetchRawERA5(lat,lon,start,end);
    document.getElementById('load-title').textContent='Loading ERA5 historical ducting data…';
  } else {
    fetchFn=(lat,lon)=>fetchRawOM(lat,lon);
    document.getElementById('load-title').textContent='Loading Great Lakes ducting data…';
  }

  frames=ANIM_HOURS.map(h=>{const{label,offset}=frameLabel(h,era5StartMs);return{h,label,offset,points:[]};});

  const total=GL_PTS.length;
  let done=0;
  const BATCH=50;

  for(let i=0;i<GL_PTS.length;i+=BATCH){
    const batch=GL_PTS.slice(i,i+BATCH);
    await Promise.all(batch.map(async([lat,lon])=>{
      try{
        const{hourly,elevation}=await fetchFn(lat,lon);
        for(let fi=0;fi<ANIM_HOURS.length;fi++){
          const s=scorePoint(hourly,ANIM_HOURS[fi],elevation);
          if(s>0)frames[fi].points.push([lat,lon,+(s/100).toFixed(3)]);
        }
      }catch{}
      done++;
      setLoadStatus(`${done} / ${total} grid points`,done,total);
    }));
  }

  saveGLCache(frames);
  hideOverlay();
  startAnimation();
}

function setLoadStatus(msg,done,total){
  document.getElementById('load-status').textContent=msg;
  document.getElementById('load-bar').style.width=`${Math.round(done/total*100)}%`;
}
function hideOverlay(){
  document.getElementById('load-overlay').classList.add('hidden');
  setTimeout(()=>lmap.invalidateSize(),100);
}


// ══════════════════════════════════════════════════════
// ANIMATION CONTROLLER
// ══════════════════════════════════════════════════════
function renderFrame(idx){
  currentFrame=((idx%frames.length)+frames.length)%frames.length;
  const frame=frames[currentFrame];
  heatLayer.setLatLngs(frame.points);

  // Time overlay on map
  const tsEl=document.getElementById('ts-overlay');
  tsEl.textContent=frame.label+(frame.offset?' · '+frame.offset:'');
  tsEl.classList.remove('hidden');

  // Controls bar
  document.getElementById('time-label').textContent=frame.label;
  document.getElementById('time-offset').textContent=frame.offset;
  document.getElementById('scrubber').value=currentFrame;
}

function startAnimation(){
  if(!frames.length)return;
  renderFrame(currentFrame);
  playing=true;
  document.getElementById('btn-play').innerHTML='&#9646;&#9646;';
  if(animTimer)clearInterval(animTimer);
  animTimer=setInterval(()=>renderFrame(currentFrame+1),frameMs);
}

function pauseAnimation(){
  playing=false;
  if(animTimer){clearInterval(animTimer);animTimer=null;}
  document.getElementById('btn-play').innerHTML='&#9654;';
}

function setSpeed(ms){
  frameMs=ms;
  document.querySelectorAll('.spd').forEach(b=>b.classList.toggle('active',+b.dataset.ms===ms));
  if(playing){pauseAnimation();startAnimation();}
}


// ══════════════════════════════════════════════════════
// MAP INIT
// ══════════════════════════════════════════════════════
const lmap=L.map('map',{zoomControl:true,preferCanvas:true}).setView([38,-96],4);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> &copy; <a href="https://carto.com">CARTO</a>',
  maxZoom:19
}).addTo(lmap);

// Radius/blur tuned for 1° grid (~100 km spacing) at CONUS zoom
const heatLayer=L.heatLayer([],{
  radius:40,blur:32,maxZoom:10,
  gradient:{0:'transparent',0.04:'#2ea043',0.25:'#3fb950',0.50:'#d29922',0.75:'#f0883e',1.0:'#f85149'}
}).addTo(lmap);

// Click → popup with link to site.html
lmap.on('click',e=>{
  const lat=e.latlng.lat,lon=e.latlng.lng;
  const href=`site.html?lat=${lat.toFixed(4)}&lon=${lon.toFixed(4)}`;
  L.popup({closeButton:false,className:'dark-popup'})
    .setLatLng(e.latlng)
    .setContent(`
      <div class="popup-coords">${lat.toFixed(2)}&deg;N &nbsp; ${Math.abs(lon).toFixed(2)}&deg;W</div>
      <a class="popup-link" href="${href}">Open Site Analysis &rarr;</a>`)
    .openOn(lmap);
});


// ══════════════════════════════════════════════════════
// MODE TOGGLE
// ══════════════════════════════════════════════════════
function switchMode(mode){
  if(mode===currentMode)return;
  currentMode=mode;
  document.getElementById('btn-mode-gfs').classList.toggle('active',mode==='gfs');
  document.getElementById('btn-mode-era5').classList.toggle('active',mode==='era5');
  document.getElementById('mode-subtitle').textContent=
    mode==='era5'
      ?"ERA5 Historical (past 7 days)  ·  n41 (2593 MHz)  ·  CONUS 1° grid"
      :"7-Day GFS Forecast  ·  n41 (2593 MHz)  ·  CONUS 1° grid";
  pauseAnimation();
  frames=[];
  currentFrame=0;
  document.getElementById('load-overlay').classList.remove('hidden');
  document.getElementById('load-bar').style.width='0';
  document.getElementById('load-status').textContent='Initializing…';
  loadGLData();
}

document.getElementById('btn-mode-gfs').addEventListener('click',()=>switchMode('gfs'));
document.getElementById('btn-mode-era5').addEventListener('click',()=>switchMode('era5'));


// ══════════════════════════════════════════════════════
// CONTROL WIRING
// ══════════════════════════════════════════════════════
document.getElementById('btn-play').addEventListener('click',()=>{
  if(playing)pauseAnimation();else startAnimation();
});
document.getElementById('btn-back').addEventListener('click',()=>{
  pauseAnimation();renderFrame(currentFrame-1);
});
document.getElementById('btn-fwd').addEventListener('click',()=>{
  pauseAnimation();renderFrame(currentFrame+1);
});
document.getElementById('scrubber').addEventListener('input',e=>{
  pauseAnimation();renderFrame(+e.target.value);
});
document.querySelectorAll('.spd').forEach(b=>{
  b.addEventListener('click',()=>setSpeed(+b.dataset.ms));
});

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key===' '){e.preventDefault();if(playing)pauseAnimation();else startAnimation();}
  else if(e.key==='ArrowLeft'){pauseAnimation();renderFrame(currentFrame-1);}
  else if(e.key==='ArrowRight'){pauseAnimation();renderFrame(currentFrame+1);}
});


// ── Boot ──────────────────────────────────────────────
loadGLData();
</script>
</body>
</html>
